version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: classroll-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: attendanceDB

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: classroll-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/attendanceDB
      JWT_SECRET: change_this_in_production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: classroll-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
