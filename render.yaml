services:
  # Backend API
  - type: web
    name: classroll-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: classroll-frontend
          type: web
          property: host

  # Frontend (static site)
  - type: web
    name: classroll-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: classroll-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
